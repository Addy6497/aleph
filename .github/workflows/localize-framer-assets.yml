name: Localizar assets de Framer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  localize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar script de localizacion
        run: python localize_assets.py

      - name: Commit y push de cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Localizar assets de Framer (automatico)"
          git push
